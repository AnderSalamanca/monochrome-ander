name: Sincronizar con el autor original

on:
  schedule:
    - cron: '0 0 * * *' # Esto se ejecuta todas las noches a las 00:00 UTC
  workflow_dispatch: # Esto te permite darle a un botón para sincronizar manualmente

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar cambios
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repository: monochrome-music/monochrome
          upstream_branch: main
          target_branch: main
          test_mode: false
